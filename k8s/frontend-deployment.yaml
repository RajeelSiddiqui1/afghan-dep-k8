kind: Deployment
apiVersion: apps/v1

metadata:
  name: frontend-deployment
  namespace: afghan-dep

spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend-container
          image: image
          ports:
            - containerPort: 80

          env:
          - name: VITE_API_BASE
            valueFrom: 
             configMapKeyRef: 
              name: config 
              key: client-url
